<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Story ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Segoe UI',sans-serif;

background:url('background.jpg');
background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

padding:20px;
}

/* Main Poster */

.container{

width:100%;
max-width:420px;

background:rgba(255,255,255,0.15);

padding:18px;

border-radius:25px;

backdrop-filter:blur(4px);

text-align:center;
}

/* Heading */

h1{

font-size:38px;

color:white;

margin-bottom:18px;

font-weight:500;
}

/* Poster */

.poster{

position:relative;
}

.poster img{

width:100%;

border-radius:20px;
display:block;
}

/* Audio Bar */

.music{

position:absolute;

bottom:12px;

left:50%;

transform:translateX(-50%);

width:88%;
}

.music audio{

width:100%;
}

/* Quote */

.quote{

margin-top:22px;

font-size:20px;

line-height:1.8;

color:white;

text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h1>Our Story ❤️</h1>

<div class="poster">

<img src="poster.jpg">

<div class="music">

<audio controls>
<source src="song.mp3" type="audio/mpeg">
</audio>

</div>

</div>

<div class="quote">

ನೀನಿರುವುದು ನನಗೆ...<br>

ನಾನು ಇರುವುದು ನಿನಗೆ....<br>

ನಮ್ಮಿಂದ ಇನ್ನು ಪ್ರೀತಿ ಬೆಳೆಯಲಿ,<br>

ಆಕಾಶದ ಕೊನೆಗೆ!!! ✨

</div>

</div>

</body>
</html>
