<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Our Story ❤️</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;

      background-image:
      linear-gradient(rgba(255,182,193,0.45),
      rgba(255,105,180,0.45)),
      url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=1200&auto=format&fit=crop');

      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      overflow:hidden;
    }

    .container{
      width:90%;
      max-width:420px;

      background:rgba(255,255,255,0.18);
      backdrop-filter:blur(12px);

      border-radius:28px;
      padding:25px;

      text-align:center;

      box-shadow:0 8px 30px rgba(0,0,0,0.25);
      border:1px solid rgba(255,255,255,0.3);
    }

    .title{
      color:white;
      font-size:34px;
      font-weight:700;
      margin-bottom:20px;

      text-shadow:2px 2px 8px rgba(0,0,0,0.5);
    }

    .poster{
      width:100%;
      max-height:420px;
      object-fit:contain;

      border-radius:22px;

      box-shadow:0 0 25px rgba(255,255,255,0.4);
      margin-bottom:20px;
    }

    .quote{
      color:white;
      font-size:24px;
      font-weight:700;
      line-height:1.6;

      text-shadow:2px 2px 8px rgba(0,0,0,0.5);
      margin-bottom:20px;
    }

    audio{
      width:100%;
      border-radius:30px;
    }

    @media(max-width:480px){

      .title{
        font-size:28px;
      }

      .quote{
        font-size:20px;
      }

      .container{
        padding:18px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <!-- TITLE -->
    <div class="title">
      Our Story ❤️
    </div>

    <!-- POSTER IMAGE -->
    <img src="poster.jpg" class="poster">

    <!-- QUOTE -->
    <div class="quote">
      ನೀನಿರುವುದು ನನಗೆ, <br>
      ನಾನು ಇರುವುದು ನಿನಗೆ <br>
      ನೆಮ್ಮಿಂದೆ ಇನ್ನು ಪ್ರೀತಿ ಬೆಲೆಯಲಿ, <br>
      ಆಕಾಶ
