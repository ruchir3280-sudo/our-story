<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Story ❤️</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;

background:
linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.6)),
url('poster.jpg');

background-size:cover;
background-position:center;
}

.container{
width:90%;
max-width:400px;
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:25px;
backdrop-filter:blur(8px);
text-align:center;
color:white;
}

h1{
font-size:38px;
margin-bottom:20px;
color:white;
text-shadow:0 0 10px pink;
font-weight:bold;
  }

img{
width:100%;
border-radius:20px;
margin-bottom:20px;
display:block;
}

.quote{
font-size:22px;
line-height:1.7;

}

.audio-box{
background:white;
padding:15px;
border-radius:15px;
}

.audio-box h2{
color:black;
margin-bottom:10px;
}

audio{
width:100%;
height:50px;
}

</style>
</head>

<body>

<div class="container">

<h1>Our Story ❤️</h1>

</div>

<div class="audio-box">

</div>
