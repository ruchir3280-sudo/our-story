<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Story ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

font-family:'Segoe UI',sans-serif;

background-image:
linear-gradient(rgba(0,0,0,0.25),rgba(0,0,0,0.35)),
url('https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2');

background-size:cover;
background-position:center;

overflow:hidden;
color:white;
padding:20px;
}

/* Curtain Animation */

.curtain-left,
.curtain-right{

position:fixed;
top:0;

width:50%;
height:100%;

background:#ffd6e7;

z-index:10;

animation-duration:2.5s;
animation-fill-mode:forwards;
}

.curtain-left{

left:0;
animation-name:leftOpen;
}

.curtain-right{

right:0;
animation-name:rightOpen;
}

@keyframes leftOpen{

from{
transform:translateX(0);
}

to{
transform:translateX(-100%);
}
}

@keyframes rightOpen{

from{
transform:translateX(0);
}

to{
transform:translateX(100%);
}
}

/* Main Card */

.container{

position:relative;

background:rgba(255,255,255,0.12);

backdrop-filter:blur(12px);

padding:22px;

border-radius:30px;

max-width:420px;
width:100%;

text-align:center;

box-shadow:0 0 25px rgba(255,255,255,0.2);

animation:fadeIn 3s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:scale(0.9);
}

to{
opacity:1;
transform:scale(1);
}
}

h1{

font-size:40px;
margin-bottom:18px;

color:#fff5f7;
font-weight:600;
}

/* Poster */

img{

width:100%;
height:auto;

border-radius:22px;

margin-bottom:22px;

box-shadow:0 0 25px rgba(255,255,255,0.25);
}

/* Quote */

.quote{

font-size:18px;

line-height:1.9;

color:#fff7fa;

margin-bottom:22px;

text-align:center;

font-weight:500;
}

/* Audio */

audio{

width:100%;
border-radius:30px;
}

/* Footer */

.footer{

margin-top:18px;

font-size:14px;

color:#fff0f5;
}

</style>
</head>

<body>

<div class="curtain-left"></div>
<div class="curtain-right"></div>

<div class="container">

<h1>Our Story ❤️</h1>

<img src="poster.jpg">

<div class="quote">

ನೀನಿರುವುದು ನನಗೆ...<br>

ನಾನು ಇರುವುದು ನಿನಗೆ....<br>

ನಮ್ಮಿಂದ ಇನ್ನು ಪ್ರೀತಿ ಬೆಳೆಯಲಿ,<br>

ಆಕಾಶದ ಕೊನೆಗೆ!!! ✨

</div>

<audio controls autoplay>

<source src="song.mp3" type="audio/mpeg">

</audio>

<div class="footer">

Forever & Always 💖

</div>

</div>

</body>
</html>
