<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Story ❤️</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#1b1515;
      overflow:hidden;
      padding:20px;
    }

    .container{
      width:390px;
      background:linear-gradient(180deg,#2a1b1b,#120c0c);
      border-radius:35px;
      padding:18px;
      position:relative;
      box-shadow:0 0 35px rgba(255,180,180,0.25);
      border:2px solid rgba(255,255,255,0.08);
    }

    .main-photo{
      width:100%;
      border:8px solid #f8dede;
      border-radius:10px;
      transform:rotate(-3deg);
      box-shadow:0 10px 25px rgba(0,0,0,0.5);
    }

    .small-top{
      width:150px;
      position:absolute;
      top:30px;
      right:15px;
      border:6px solid #f8e8e8;
      transform:rotate(5deg);
      box-shadow:0 10px 20px rgba(0,0,0,0.5);
    }

    .gallery{
      display:flex;
      gap:12px;
      margin-top:20px;
    }

    .gallery img{
      width:48%;
      border:7px solid #f8dede;
      border-radius:6px;
      box-shadow:0 10px 20px rgba(0,0,0,0.4);
    }

    .gallery img:first-child{
      transform:rotate(-4deg);
    }

    .gallery img:last-child{
      transform:rotate(4deg);
    }

    .title{
      margin-top:25px;
      color:#f5d5c8;
      font-size:52px;
      line-height:0.9;
      font-family:cursive;
    }

    .text{
      margin-top:15px;
      color:#fff;
      line-height:1.5;
      font-size:18px;
    }

    .highlight{
      color:#f4c8a2;
      font-family:cursive;
      font-size:28px;
    }

    .music-box{
      margin-top:25px;
      border:1px solid rgba(255,200,170,0.5);
      border-radius:18px;
      padding:18px;
      color:white;
      background:rgba(255,255,255,0.03);
      backdrop-filter:blur(8px);
    }

    .music-title{
      font-size:18px;
      letter-spacing:1px;
      margin-bottom:15px;
    }

    audio{
      width:100%;
      margin-top:10px;
    }

    .calendar{
      width:180px;
      background:#fff;
      color:#000;
      padding:15px;
      border-radius:10px;
      margin:25px auto 10px;
      text-align:center;
      border:8px solid #f5ddd0;
      box-shadow:0 8px 20px rgba(0,0,0,0.4);
    }

    .calendar h2{
      margin-bottom:10px;
      font-family:cursive;
    }

    .calendar p{
      line-height:1.6;
      font-size:14px;
    }

    .footer{
      margin-top:20px;
      text-align:center;
      color:#eac1b4;
      font-size:18px;
      font-family:cursive;
    }

    .heart{
      position:absolute;
      color:#ff9db7;
      font-size:22px;
      animation:float 4s infinite ease-in-out;
    }

    .h1{top:20px;left:20px;}
    .h2{bottom:180px;right:25px;}
    .h3{bottom:70px;left:30px;}

    @keyframes float{
      0%{transform:translateY(0px);}
      50%{transform:translateY(-10px);}
      100%{transform:translateY(0px);}
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="heart h1">❤</div>
    <div class="heart h2">❤</div>
    <div class="heart h3">❤</div>

    <!-- MAIN IMAGE -->
    <img src="main.jpg" class="main-photo">

    <!-- TOP SMALL IMAGE -->
    <img src="top.jpg" class="small-top">

    <!-- BOTTOM GALLERY -->
    <div class="gallery">
      <img src="photo1.jpg">
      <img src="photo2.jpg">
    </div>

    <!-- TEXT -->
    <div class="title">
      Our<br>Story
    </div>

    <div class="text">
      Different moments, same energy.<br>
      <span class="highlight">You, Me & the good times.</span>
    </div>

    <!-- MUSIC PLAYER -->
    <div class="music-box">
      <div class="music-title">PLAYING OUR SONG ❤️</div>

      <audio controls autoplay loop>
        <source src="song.mp3" type="audio/mpeg">
      </audio>
    </div>

    <!-- CALENDAR -->
    <div class="calendar">
      <h2>April 2025</h2>
      <p>
        S M T W T F S<br><br>
        1 2 3 4 5<br>
        6 7 8 9 10 11 12<br>
        13 14 15 16 17 18 19<br>
        20 21 22 23 24 25 26<br>
        27 28 <b>29 ❤️</b> 30
      </p>
    </div>

    <div class="footer">
      Memories will cherish forever ❤️
    </div>

  </div>

</body>
</html>
