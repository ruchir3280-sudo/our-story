<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .poster {
            max-width: 400px;
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.5);
            margin-bottom: 20px;
        }

        audio {
            width: 100%;
            max-width: 400px;
            margin-top: 10px;
            outline: none;
        }

        h1 {
            text-align: center;
            color: #ff4b9b;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            color: #ff8acb;
        }
    </style>
</head>
<body>
    <h1>Our Story ❤️</h1>
    <!-- Poster Image -->
    <img src="WhatsApp Image 2026-05-23 at 1.10.42 PM.jpeg" alt="Our Story Poster" class="poster">

    <!-- Audio Player -->
    <audio controls>
        <source src="song.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div class="footer">
        <p>Different moments, same energy. You, Me & the good times.</p>
    </div>
</body>
</html>
