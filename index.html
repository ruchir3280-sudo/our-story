<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Story ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

font-family:sans-serif;

background-image:
linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2');

background-size:cover;
background-position:center;

color:white;
text-align:center;
padding:20px;
}

.container{

background:rgba(0,0,0,0.45);

padding:25px;

border-radius:25px;

backdrop-filter:blur(8px);

max-width:400px;
width:100%;
}

h1{

font-size:42px;
margin-bottom:20px;
}

img{

width:100%;
border-radius:20px;

margin-bottom:20px;

box-shadow:0 0 20px rgba(255,255,255,0.2);
}

audio{

width:100%;
margin-top:15px;
}

p{

margin-top:15px;
font-size:15px;
color:#ddd;
}

</style>
</head>

<body>

<div class="container">

<h1>Our Story ❤️</h1>

<img src="poster.jpg">

<audio controls>
<source src="song.mp3" type="audio/mpeg">
</audio>

<p>Different moments, same love ✨</p>

</div>

</body>
</html>
