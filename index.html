<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Story ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

font-family:'Segoe UI',sans-serif;

/* Love Theme Background */

background:linear-gradient(
135deg,
#ff758c,
#ff7eb3,
#ff4d6d,
#ff758c
);

background-size:400% 400%;

animation:bgAnimation 12s ease infinite;
}

/* Animated Gradient */

@keyframes bgAnimation{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* Floating Hearts */

.hearts{

position:absolute;
width:100%;
height:100%;
overflow:hidden;
top:0;
left:0;
}

.hearts span{

position:absolute;
display:block;

color:white;

font-size:22px;

animation:float 10s linear infinite;

opacity:0.8;
}

/* Heart Animation */

@keyframes float{

0%{

transform:translateY(100vh) scale(0);
opacity:0;
}

20%{

opacity:1;
}

100%{

transform:translateY(-10vh) scale(1.5);
opacity:0;
}

}

/* Different Heart Positions */

.hearts span:nth-child(1){
left:10%;
animation-duration:8s;
font-size:20px;
}

.hearts span:nth-child(2){
left:25%;
animation-duration:12s;
font-size:30px;
}

.hearts span:nth-child(3){
left:40%;
animation-duration:10s;
font-size:25px;
}

.hearts span:nth-child(4){
left:55%;
animation-duration:14s;
font-size:35px;
}

.hearts span:nth-child(5){
left:70%;
animation-duration:9s;
font-size:28px;
}

.hearts span:nth-child(6){
left:85%;
animation-duration:11s;
font-size:22px;
}

/* Main Container */

.container{

position:relative;
z-index:2;

text-align:center;
}

/* Poster */

.poster{

width:90%;
max-width:400px;

border-radius:25px;

box-shadow:0 0 25px rgba(255,255,255,0.5);
}

/* Music Player */

.music{

margin-top:20px;
}

.music audio{

width:90%;
max-width:350px;
}

/* Quote */

.quote{

margin-top:20px;

font-size:22px;
line-height:1.8;

color:white;

text-shadow:0 0 10px rgba(0,0,0,0.5);

padding:0 20px;
}

</style>
</head>

<body>

<!-- Floating Hearts -->

<div class="hearts">

<span>❤️</span>
<span>💕</span>
<span>💖</span>
<span>💘</span>
<span>💞</span>
<span>❤️</span>

</div>

<!-- Main Content -->

<div class="container">

<img src="poster.jpeg" class="poster">

<div class="music">

<audio controls>
<source src="song.mp3" type="audio/mpeg">
</audio>

</div>

<div class="quote">

ನೀನಿರುವುದು ನನಗೆ...<br>

ನಾನು ಇರುವುದು ನಿನಗೆ....<br>

ನಮ್ಮಿಂದ ಇನ್ನು ಪ್ರೀತಿ ಬೆಳೆಯಲಿ,<br>

ಆಕಾಶದ ಕೊನೆಗೆ!!! ✨

</div>

</div>

</body>
</html>
